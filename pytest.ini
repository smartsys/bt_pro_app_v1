[pytest]
# GEÄNDERT: Ticket 14 — Test-Infrastruktur-Konfiguration
# Integration-Tests (gegen echte Prod-DB, Monitoring-Charakter) per Default ausschliessen.
# Ausfuehren mit: pytest -m integration tests/test_iteration_id_backfill_quote.py
addopts = -m "not integration"

markers =
    integration: Tests die gegen echte Produktionsdaten laufen (kein Unit-Test-Charakter)
